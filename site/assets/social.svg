<!--
  NOTE: authored on a 1200x1200 square outer canvas with the real 1200x630 card
  content vertically centered inside it (translate y=285). This is a rendering
  workaround: `qlmanage -t -s 1200` pads non-square SVG viewBoxes into a square
  canvas top-aligned rather than scaling to the requested aspect ratio, which
  made a direct 1200x630 viewBox unusable for rasterization. Squaring the
  canvas and centering the content lets a plain `sips -c 630 1200` centered
  crop lift out exactly the intended 1200x630 card after rasterizing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Kilnworks — self-hostable RAG that keeps its secrets">
  <defs>
    <radialGradient id="glow" cx="984" cy="222" r="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d2703f" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#d2703f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground (full square so the crop margins match the card) -->
  <rect x="0" y="0" width="1200" height="1200" fill="#1b1814"/>
  <rect x="0" y="0" width="1200" height="1200" fill="url(#glow)"/>

  <!-- card content, vertically centered in the square for the sips crop -->
  <g transform="translate(0,285)">

  <!-- kicker -->
  <circle cx="86" cy="123" r="6" fill="#d2703f"/>
  <text x="104" y="129" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" letter-spacing="3.3" fill="#b8a892">SELF-HOSTABLE RAG</text>

  <!-- mark + wordmark lockup -->
  <g transform="translate(80,168) scale(3.55)">
    <path d="M6.5 3.2 H17.5 L15.8 6.6 a6.6 6.6 0 1 1 -7.6 0 Z" fill="none" stroke="#d2703f" stroke-width="1.55" stroke-linejoin="round"/>
    <path d="M8.6 12.4 a3.6 3.6 0 0 0 6.8 0" fill="none" stroke="#8fbf9f" stroke-width="1.55" stroke-linecap="round"/>
  </g>
  <text x="200" y="270" font-family="Palatino, Georgia, serif" font-size="104" font-weight="600" letter-spacing="-1">
    <tspan font-style="italic" fill="#d2703f">Kiln</tspan><tspan fill="#f0e7d7">works</tspan>
  </text>

  <!-- tagline -->
  <text x="82" y="342" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="29" fill="#b8a892">A self-hostable RAG assistant that keeps its secrets.</text>

  <!-- pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600">
    <rect x="82" y="404" width="240" height="46" rx="23" fill="none" stroke="#8fbf9f" stroke-width="1.5"/>
    <text x="106" y="433" fill="#8fbf9f">ACLs at retrieval</text>

    <rect x="338" y="404" width="258" height="46" rx="23" fill="#26201a" stroke="#39302a" stroke-width="1.5"/>
    <text x="362" y="433" fill="#b8a892">Postgres + pgvector</text>

    <rect x="612" y="404" width="150" height="46" rx="23" fill="#26201a" stroke="#39302a" stroke-width="1.5"/>
    <text x="636" y="433" fill="#b8a892">Apache-2.0</text>
  </g>

  <!-- built by InoGen -->
  <text x="1120" y="586" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#857866">built by <tspan fill="#b8a892" font-weight="600">InoGen</tspan></text>

  </g>
</svg>
