name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -v
  connectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra connectors
      - run: >
          uv run pytest tests/adapters/test_mcp_stdio.py tests/adapters/test_connectors.py
          tests/core/test_connector_registry.py -q
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kilnworks:ci .
      - run: docker run --rm kilnworks:ci --help
      # ffmpeg must be in the runtime image or video ingestion silently fails per-file.
      - run: docker run --rm --entrypoint ffmpeg kilnworks:ci -version
  eval:
    runs-on: ubuntu-latest
    env:
      KILNWORKS_FAKE_PROVIDERS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: docker compose up -d --wait db
      - run: uv run kilnworks init-db
      - run: uv run kilnworks ingest evals/smoke-corpus
      - run: >
          uv run kilnworks eval evals/smoke.jsonl --limit 1
          --min-hit-rate 1.0 --min-citation-rate 1.0 --min-faithfulness 1.0
