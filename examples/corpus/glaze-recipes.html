    <h1>Glaze Recipes</h1>
    <p>The studio's celadon glaze is 40% feldspar, 30% silica, 20% whiting, and
    10% kaolin, fired to cone 10 in reduction.</p>
    <p>Shared glazes must be labelled with the mixing date.</p>
